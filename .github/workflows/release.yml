name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build & attach to (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --noconfirm --windowed --name PoBongoCat \
            --add-data "assets:assets" --collect-all pynput \
            --osx-bundle-identifier com.zenuie.pobongocat run.py
          /usr/libexec/PlistBuddy -c "Add :LSUIElement bool true" \
            "dist/PoBongoCat.app/Contents/Info.plist"
          cd dist && zip -ry PoBongoCat-macOS.zip "PoBongoCat.app"

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --noconfirm --windowed --onefile --name PoBongoCat `
            --add-data "assets;assets" --collect-all pynput run.py

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            dist/PoBongoCat-macOS.zip
            dist/PoBongoCat.exe
          fail_on_unmatched_files: false
